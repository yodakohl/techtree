<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTree Documentary Demo - Technology Timelines</title>
    <meta name="description" content="Watch a cinematic TechTree timeline showing the inventions that had to exist before a target technology.">
    <meta name="keywords" content="technology tree, technology documentary, technology timeline, CRISPR technology map, dependency graph">
    <link rel="canonical" href="https://pushme.site/techtree/demo.html">
    <link rel="sitemap" type="application/xml" href="https://pushme.site/techtree/sitemap.xml">
    <meta name="theme-color" content="#030507">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TechTree">
    <meta property="og:title" content="TechTree Documentary Demo">
    <meta property="og:description" content="A live documentary-style timeline of the technologies underneath CRISPR, EUV chips, RAG, grid storage, and more.">
    <meta property="og:url" content="https://pushme.site/techtree/demo.html">
    <meta property="og:image" content="https://pushme.site/techtree/assets/techtree-social.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TechTree Documentary Demo">
    <meta name="twitter:description" content="Watch a target technology emerge from its prerequisite stack.">
    <meta name="twitter:image" content="https://pushme.site/techtree/assets/techtree-social.png">
    <link rel="stylesheet" href="style.css?v=20260716c">
</head>
<body class="documentary-demo">
    <a class="documentary-skip-link" href="#documentary-target">Skip to documentary controls</a>
    <main class="documentary-stage" aria-labelledby="documentary-title" aria-busy="true">
        <canvas id="documentary-canvas" class="documentary-canvas" aria-hidden="true"></canvas>
        <div class="documentary-ui">
            <header class="documentary-nav">
                <a class="documentary-brand" href="demo.html">TechTree</a>
                <nav aria-label="Primary navigation">
                    <a href="index.html">Graph</a>
                    <a href="sorted.html">Sorted</a>
                    <a href="https://github.com/yodakohl/techtree">GitHub</a>
                </nav>
            </header>

            <section class="documentary-copy">
                <p id="documentary-kicker" class="documentary-kicker">Loading graph...</p>
                <h1 id="documentary-title">Technology is never alone.</h1>
                <p id="documentary-caption" class="documentary-caption">A target technology is a final frame. TechTree shows the inventions underneath it as a moving timeline.</p>
                <p id="documentary-meta" class="documentary-meta">Source-backed dependency graph</p>
            </section>

            <section id="documentary-controls" class="documentary-controls" aria-labelledby="documentary-controls-title">
                <h2 id="documentary-controls-title" class="visually-hidden">Documentary controls</h2>
                <div class="documentary-search">
                    <label class="visually-hidden" for="documentary-target">Target technology</label>
                    <input id="documentary-target" type="search" list="documentary-target-options" placeholder="Choose any target technology" autocomplete="off" autocapitalize="none" spellcheck="false" aria-describedby="documentary-status">
                    <datalist id="documentary-target-options"></datalist>
                    <div class="documentary-transport" role="group" aria-label="Playback controls">
                        <button id="documentary-previous" type="button" aria-label="Previous scene">Previous</button>
                        <button id="documentary-play-toggle" type="button" aria-label="Pause documentary">Pause</button>
                        <button id="documentary-next" type="button" aria-label="Next scene">Next</button>
                    </div>
                </div>
                <div class="documentary-presets" role="group" aria-label="Preset documentary cuts">
                    <button type="button" data-documentary-target="crispr_gene_editing" aria-pressed="false">CRISPR</button>
                    <button type="button" data-documentary-target="high_na_euv_lithography" aria-pressed="false">EUV Chips</button>
                    <button type="button" data-documentary-target="retrieval_augmented_generation" aria-pressed="false">RAG</button>
                    <button type="button" data-documentary-target="long_duration_energy_storage" aria-pressed="false">Grid Storage</button>
                </div>
            </section>

            <section class="documentary-timeline" aria-labelledby="documentary-timeline-title">
                <h2 id="documentary-timeline-title" class="visually-hidden">Timeline scenes</h2>
                <div class="documentary-progress-track" role="progressbar" aria-label="Documentary playback progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    <span id="documentary-progress"></span>
                </div>
                <div id="documentary-scenes" class="documentary-scenes" role="group" aria-label="Choose a scene"></div>
            </section>

            <p id="documentary-status" class="documentary-status" role="status" aria-live="polite" aria-atomic="true">Loading...</p>
        </div>
    </main>
    <script defer src="demo.js?v=20260716c"></script>
</body>
</html>
