<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTree - Human Technology Dependency Graph</title>
    <meta name="description" content="TechTree is a source-backed human technology dependency graph for exploring prerequisites, unlocks, evidence, and future roadmap fields.">
    <meta name="keywords" content="technology tree, dependency graph, technology roadmap, history of technology, open data, research tool">
    <link rel="canonical" href="https://pushme.site/techtree/">
    <link rel="sitemap" type="application/xml" href="https://pushme.site/techtree/sitemap.xml">
    <meta name="theme-color" content="#2c3e50">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TechTree">
    <meta property="og:title" content="TechTree - Human Technology Dependency Graph">
    <meta property="og:description" content="Explore what technologies depend on, what they unlock, and what likely comes next.">
    <meta property="og:url" content="https://pushme.site/techtree/">
    <meta property="og:image" content="https://pushme.site/techtree/assets/techtree-social.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TechTree - Human Technology Dependency Graph">
    <meta name="twitter:description" content="A source-backed map of technology prerequisites, unlocks, evidence, and future roadmap fields.">
    <meta name="twitter:image" content="https://pushme.site/techtree/assets/techtree-social.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260711a">
    <script defer src="vendor/vis-network.min.js?v=20260516b"></script>
</head>
<body>
    <header>
        <h1>TechTree</h1>
        <nav>
            <a href="demo.html">Demo</a>
            <a href="sorted.html">Sorted View</a>
        </nav>
    </header>
    <main>
        <div id="tech-tree-container" role="region" aria-label="Interactive technology dependency graph">
            <!-- The tree will be rendered here by JavaScript -->
        </div>
        <div id="side-panels">
            <div id="tech-info-panel">
                <h2>Select a Technology</h2>
                <label class="visually-hidden" for="search-tech">Search technologies</label>
                <input type="search" id="search-tech" placeholder="Search by name or ID" autocomplete="off">
                <label class="visually-hidden" for="era-filter">Filter by era</label>
                <select id="era-filter" aria-label="Filter by era">
                    <option value="all">All Eras</option>
                </select>
                <label class="visually-hidden" for="field-filter">Filter by field</label>
                <select id="field-filter" aria-label="Filter by field">
                    <option value="all">All Fields</option>
                </select>
                <label class="graph-focus-toggle">
                    <input type="checkbox" id="focus-relevant" checked>
                    Focus relevant
                </label>
                <p id="graph-context-summary" class="graph-context-summary" aria-live="polite"></p>
                <p id="app-status" class="app-status" role="status" aria-live="polite"></p>
                <p id="tech-name"></p>
                <p id="tech-era"></p>
                <p id="tech-description"></p>
                <p id="tech-prerequisites"></p>
                <div id="tech-relationships" class="tech-relationships" hidden>
                    <section>
                        <h3>Prerequisites</h3>
                        <div id="tech-prereq-list" class="relationship-chip-list"></div>
                    </section>
                    <section>
                        <h3>Unlocks</h3>
                        <div id="tech-unlocks-list" class="relationship-chip-list"></div>
                    </section>
                </div>
                <button type="button" id="edit-tech-btn" disabled>Edit</button>
                <button type="button" id="delete-tech-btn" class="danger-button" disabled>Delete</button>
            </div>
            <div id="tech-add-panel">
                <h2 id="editor-title">Add Technology</h2>
                <label class="editor-field" for="new-tech-id">
                    <span>Identifier</span>
                    <input type="text" id="new-tech-id" placeholder="steam_engine" autocomplete="off">
                </label>
                <label class="editor-field" for="new-tech-name">
                    <span>Name</span>
                    <input type="text" id="new-tech-name" autocomplete="off">
                </label>
                <label class="editor-field" for="new-tech-era">
                    <span>Era</span>
                    <select id="new-tech-era">
                        <option value="Ancient">Ancient</option>
                        <option value="Classical">Classical</option>
                        <option value="Medieval">Medieval</option>
                        <option value="Renaissance">Renaissance</option>
                        <option value="Industrial">Industrial</option>
                        <option value="Modern" selected>Modern</option>
                        <option value="Future">Future</option>
                    </select>
                </label>
                <label class="editor-field" for="new-tech-description">
                    <span>Description</span>
                    <textarea id="new-tech-description" rows="4"></textarea>
                </label>
                <label class="editor-field" for="new-tech-prereq">
                    <span>Prerequisite IDs</span>
                    <input type="text" id="new-tech-prereq" placeholder="comma_separated, identifiers" autocomplete="off">
                </label>
                <div class="editor-actions">
                    <button type="button" id="add-tech-btn">Add Technology</button>
                    <button type="button" id="update-tech-btn" hidden>Update Technology</button>
                    <button type="button" id="cancel-edit-btn" class="secondary-button" hidden>Cancel</button>
                </div>
                <p id="editor-status" class="editor-status" role="status" aria-live="polite"></p>
            </div>
            <div id="era-legend">
                <h2>Era Legend</h2>
                <!-- Populated by app.js -->
            </div>
        </div>
    </main>
    <script defer src="app.js?v=20260711a"></script>   <!-- Application logic -->
</body>
</html>
