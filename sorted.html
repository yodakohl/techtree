<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTree Sorted View - Browse Technology Fields</title>
    <meta name="description" content="Browse TechTree's validated technologies by era, field, dependency depth, branch, maturity, and roadmap status.">
    <meta name="keywords" content="technology list, technology fields, invention timeline, technology roadmap, dependency depth">
    <link rel="canonical" href="https://pushme.site/techtree/sorted.html">
    <link rel="sitemap" type="application/xml" href="https://pushme.site/techtree/sitemap.xml">
    <meta name="theme-color" content="#2c3e50">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TechTree">
    <meta property="og:title" content="TechTree Sorted View - Browse Technology Fields">
    <meta property="og:description" content="Scan 1,664 validated technologies by era, field, branch, dependency depth, and roadmap status.">
    <meta property="og:url" content="https://pushme.site/techtree/sorted.html">
    <meta property="og:image" content="https://pushme.site/techtree/assets/techtree-social.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TechTree Sorted View - Browse Technology Fields">
    <meta name="twitter:description" content="A compact browser for source-backed technology data across fields and eras.">
    <meta name="twitter:image" content="https://pushme.site/techtree/assets/techtree-social.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260519a">
</head>
<body>
    <header>
        <h1>Sorted Technologies</h1>
        <nav>
            <a href="demo.html">Demo</a>
            <a href="index.html">Graph View</a>
        </nav>
    </header>
    <main class="sorted-main">
        <div class="sorted-layout">
            <div id="sorted-tech-container">
                <div class="sorted-toolbar">
                    <input type="search" id="sorted-search" placeholder="Search technologies, IDs, prerequisites">
                    <select id="sorted-view" aria-label="Choose view">
                        <option value="branches">Compact Branches</option>
                        <option value="details">Detailed Table</option>
                    </select>
                    <select id="sorted-field-filter" aria-label="Choose field lens">
                        <option value="all">All Fields</option>
                    </select>
                    <select id="sorted-branch-filter" aria-label="Filter by branch">
                        <option value="all">All Branches</option>
                    </select>
                    <select id="sorted-era-filter" aria-label="Filter by era">
                        <option value="all">All Eras</option>
                    </select>
                    <select id="sorted-sort" aria-label="Sort technologies">
                        <option value="era">Era + Depth</option>
                        <option value="dependency">Dependency Depth</option>
                        <option value="name">Name</option>
                    </select>
                </div>
                <div class="sorted-summary">
                    <span id="sorted-count"></span>
                    <span id="sorted-status" role="status"></span>
                </div>
                <div id="sorted-sections"></div>
                <button id="sorted-more" class="sorted-more" type="button" hidden>Show More</button>
            </div>
            <aside id="sorted-detail-panel" class="sorted-detail-panel" aria-live="polite"></aside>
        </div>
    </main>
    <script defer src="sorted.js?v=20260606a"></script>
</body>
</html>
